version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai_sales_page_gen_app:latest
    container_name: ai_sales_page_gen_app
    env_file:
      - .env
    environment:
      PORT: 10000
      APP_ENV: production
      APP_DEBUG: 'false'
      APP_URL: http://localhost:8000
    ports:
      - '8000:10000'
    volumes:
      - ./database/data:/var/www/html/database/data
    restart: unless-stopped

volumes:
  database_data:
    driver: local
